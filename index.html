<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectacular Website</title>
<style>
  /* Gradient background */
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff5f6d, #ffc371);
    color: white;
    overflow: hidden;
  }

  /* Animated heading */
  h1 {
    font-size: 4rem;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(90deg, 00ff00, 0000ff, ff0000)
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientAnimation 5s ease infinite;
  }

  @keyframes gradientAnimation {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  /* Spectacular button */
  .btn {
    margin-top: 30px;
    padding: 20px 50px;
    font-size: 1.5rem;
    border: none;
    border-radius: 12px;
    background: #fff;
    color: #ff5f6d;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .btn:hover {
    transform: scale(1.2);
    background: #ffc371;
    color: #fff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }

  /* Floating stars */
  .star {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 3s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% {opacity: 0.2;}
    50% {opacity: 1;}
  }
</style>
</head>
<body>

<h1>Welcome to Spectacular World!</h1>
<a href="https://6aich.github.io/special-journey/" target="_blank" class="btn"> go to the:  ultimate fun website🌐</a>

<script>
  // Create floating stars
  const stars = 100;
  for(let i=0;i<stars;i++){
    const star = document.createElement('div');
    star.classList.add('star');
    star.style.top = Math.random() * window.innerHeight + 'px';
    star.style.left = Math.random() * window.innerWidth + 'px';
    star.style.width = star.style.height = Math.random() * 3 + 2 + 'px';
    star.style.animationDuration = Math.random() * 3 + 2 + 's';
    document.body.appendChild(star);
  }
</script>

</body>
</html>
